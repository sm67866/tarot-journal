<!DOCTYPE html>
<html>
<head>
    <title>Tarot Journal</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">

        <h1>🔮 Tarot Journal</h1>

        <form id="journalForm">
    <input type="date" id="date" required>

    <select id="spreadType" required>
    <option value="one">One Card</option>
    <option value="three">Past / Present / Future</option>
    <option value="problem">Problem / Advice / Outcome</option>
    <option value="situation">Situation / Obstacle / Advice</option>
    <option value="mindbody">Mind / Body / Spirit</option>
</select>

    <div id="cardFields"></div>
<div id="meaningPreview"></div>
    <textarea id="notes" placeholder="Your interpretation..." required></textarea>

    <button type="submit">Save Reading</button>
</form>

        <h2>Past Readings</h2>
<input type="text" id="searchInput" placeholder="Search readings by card, note, or spread...">
        <div id="entries"></div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="script.js"></script>
</body>
</html>
