<!DOCTYPE html>
<html>
<head>
    <title>Tarot Journal</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">

        <h1>🔮 Tarot Journal</h1>

        <form id="journalForm">
            <input type="date" id="date" required>

<select id="arcana" required>
    <option value="major">Major Arcana</option>
    <option value="minor">Minor Arcana</option>
</select>

<select id="card" required>
</select>

<select id="orientation" required>
    <option value="Upright">Upright</option>
    <option value="Reversed">Reversed</option>
</select>
            <textarea id="notes" placeholder="Your interpretation..." required></textarea>

            <button type="submit">Save Reading</button>
        </form>

        <h2>Past Readings</h2>

        <div id="entries"></div>

    </div>

    <script src="script.js"></script>
</body>
</html>
